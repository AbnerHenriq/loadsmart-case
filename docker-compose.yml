version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file: .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_meta/${POSTGRES_DB}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    DUCKDB_PATH: /opt/airflow/data/loadsmart.duckdb
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./scripts:/opt/airflow/scripts
    - ./dbt:/opt/airflow/dbt
  depends_on:
    postgres_meta:
      condition: service_healthy

services:
  postgres_meta:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir dbt-core==1.8.6 dbt-duckdb==1.8.4 duckdb==1.1.0 pandas==2.2.2 &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@loadsmart.com \
          --password admin
    restart: on-failure
    depends_on:
      postgres_meta:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir dbt-core==1.8.6 dbt-duckdb==1.8.4 duckdb==1.1.0 pandas==2.2.2
      && airflow webserver"
    ports:
      - "9090:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir dbt-core==1.8.6 dbt-duckdb==1.8.4 duckdb==1.1.0 pandas==2.2.2
      && airflow scheduler"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  superset-init:
    build: ./docker/superset
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    volumes:
      - superset_home:/app/superset_home
      - ./data:/opt/airflow/data
    command:
      - /bin/bash
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@loadsmart.com --password admin &&
        superset init
    restart: on-failure

  superset:
    build: ./docker/superset
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    volumes:
      - superset_home:/app/superset_home
      - ./data:/opt/airflow/data
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      superset-init:
        condition: service_completed_successfully
    restart: unless-stopped

  superset-bootstrap:
    build: ./docker/superset
    env_file: .env
    environment:
      SUPERSET_URL: http://superset:8088
      SUPERSET_USERNAME: admin
      SUPERSET_PASSWORD: admin
      DUCKDB_PATH: /opt/airflow/data/loadsmart.duckdb
    volumes:
      - ./scripts:/scripts
      - ./data:/opt/airflow/data
    command: ["python", "/scripts/superset_bootstrap.py"]
    depends_on:
      superset:
        condition: service_healthy
    restart: on-failure

  superset-mcp:
    build: ./docker/superset
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    volumes:
      - superset_home:/app/superset_home
      - ./data:/opt/airflow/data
    command: ["superset", "mcp", "run", "--host", "0.0.0.0", "--port", "5008"]
    ports:
      - "5008:5008"
    depends_on:
      superset:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_meta_data:
  superset_home:
